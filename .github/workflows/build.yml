name: "Build and Copy Apps"

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/build.yml'

jobs:
  filter-paths:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      landingpage: ${{ steps.filter.outputs.landingpage }}
      photo-booth: ${{ steps.filter.outputs.photo-booth }}
      portfolio-agent: ${{ steps.filter.outputs.portfolio-agent }}
      videowall: ${{ steps.filter.outputs.videowall }}
      changed_apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          #define the filters for each app here. The key has to match the src-folder.
          filters: |
            landingpage:
              - '.github/workflows/build.yml'
              - 'src/common/**'
              - 'src/landingpage/**'
            photo-booth:
              - '.github/workflows/build.yml'
              - 'src/common/**'
              - 'src/photo-booth/**'
            portfolio-agent:
              - '.github/workflows/build.yml'
              - 'src/common/**'
              - 'src/portfolio-agent/**'
            videowall:
              - '.github/workflows/build.yml'
              - 'src/common/**'
              - 'src/videowall/**'
      - name: Filter Paths result
        shell: bash
        run: |
          echo "App changes detected at following apps: ${{ steps.filter.outputs.changes }}"

  build-app:
    # This joib will build the specific app(s). Will be called as matrix for all apps with changes detected.
    needs: filter-paths
    runs-on: ubuntu-latest
  
    strategy:
      matrix:
        app: ${{ fromJson(needs.filter-paths.outputs.changed_apps) }}

    steps:
      - name: Test 1
        shell: bash
        run: |
          echo "App changes detected at: ${{ matrix.app }}"

      # - name: Setup Node.js (App: ${{ matrix.app }})
