<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Printer Canvas Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @font-face {
            font-family: Gellix;
            src: url(../fonts/Gellix-Regular.woff2) format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: Gellix;
            src: url(../fonts/Gellix-Medium.woff2) format("woff2");
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: Gellix;
            src: url(../fonts/Gellix-SemiBold.woff2) format("woff2");
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: Gellix;
            src: url(../fonts/Gellix-Bold.woff2) format("woff2");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        .dummy-content {
            width: 300px; /* Standard 80mm-ish width */
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            
            font-weight: 400;
            color: #000048;
            font-family: Gellix, system-ui, sans-serif;
            /* white-space: nowrap; */
        }

        .dummy-content h1 {
            font-size: .16in;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .dummy-content p {
            font-size: .24in;
            font-weight: 400;
            line-height: 1.05;
            margin-bottom: 10px;
        }

        .dummy-content p.subline {
            font-size: .14in;
            font-weight: 400;
            line-height: 1.15;
            margin-bottom: 10px;
            color: #2f78c4;
        }

        

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover { background: #0056b3; }
        
        #preview-label { margin-top: 20px; font-weight: bold; display: none; }
        #canvas-preview { border: 1px solid #ccc; margin-top: 10px; max-width: 100%; }
    </style>
</head>
<body>

    <div class="dummy-content">
        <h1>Adobe Summit 2026</h1>
        <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry.</p>
        <p class="subline">Lorem Ipsum is simply dummy text of the printing and typesetting industry.</p>
    </div>

    <button onclick="processAndPrint()">Generate & Print</button>

    <div id="preview-label">Generated 1-Bit Bitmap Preview:</div>
    <canvas id="canvas-preview"></canvas>

    <script>
        async function processAndPrint() {
            const dummyContent = document.querySelector('.dummy-content');
            const previewCanvas = document.getElementById('canvas-preview');
            const previewLabel = document.getElementById('preview-label');

            if (!dummyContent) {
                console.error('Dummy content element not found. Expected .dummy-content in DOM.');
                return;
            }

            // 1. Render HTML to Canvas at 3x scale for sharpness
            const canvas = await html2canvas(dummyContent, {
                scale: 3, 
                backgroundColor: "#ffffff",
                logging: false
            });

            // 2. High-Contrast (Thresholding) Processing
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                // Get brightness (grayscale)
                const brightness = (data[i] + data[i + 1] + data[i + 2]) / 3;
                
                // If brightness is less than 180 (grey/black), force to pure black
                // If higher, force to pure white. This kills anti-aliasing fuzz.
                const val = brightness < 180 ? 0 : 255;
                
                data[i] = data[i + 1] = data[i + 2] = val;
            }
            ctx.putImageData(imageData, 0, 0);

            // 3. Show preview on screen
            previewCanvas.width = canvas.width;
            previewCanvas.height = canvas.height;
            previewCanvas.getContext('2d').putImageData(imageData, 0, 0);
            previewLabel.style.display = 'block';

            // 4. Create Print Window
            const imgData = canvas.toDataURL("image/png");
            const printWindow = window.open('', '_blank');
            
            printWindow.document.write(`
                <html>
                <head>
                    <title>Print Receipt</title>
                    <style>
                        @page { margin: 0; }
                        body { margin: 0; padding: 0; text-align: center; }
                        img { 
                            width: 100%; 
                            image-rendering: pixelated; 
                            image-rendering: crisp-edges;
                        }
                    </style>
                </head>
                <body onload="setTimeout(() => { window.print(); window.close(); }, 250)">
                    <img src="${imgData}" />
                </body>
                </html>
            `);
            printWindow.document.close();
        }
    </script>
</body>
</html>
